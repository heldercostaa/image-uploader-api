name: image-uploader

services:
  postgres:
    container_name: postgres
    image: postgres:16.3-alpine
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: "image_uploader"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      # - pg_data:/var/lib/postgresql/data
      - ./docker:/docker-entrypoint-initdb.d
